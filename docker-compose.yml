services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: investintell-light-db
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: light
      POSTGRES_PASSWORD: light
      POSTGRES_DB: investintell_light
    volumes:
      - investintell_light_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U light -d investintell_light"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  investintell_light_db_data:
