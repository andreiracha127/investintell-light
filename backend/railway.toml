# Railway — serviço cron fund-catalog-sync (NÃO usado pelo InsForge compute).
# Roda o sync do catálogo de fundos (scripts/sync_funds.py) diariamente,
# DEPOIS da cadeia de workers do data-lake (instrument_ingestion 06:00 →
# risk_metrics 07:00 + peer percentiles). Fonte E destino são o TimescaleDB
# Cloud: INVESTINTELL_DB_URL e DATABASE_URL apontam ambos para o Tiger
# (desde 2026-06-12 não existe mais dependência do Postgres local do
# projeto investintell-allocation).
[deploy]
startCommand = "uv run --no-sync python scripts/sync_funds.py"
restartPolicyType = "never"
cronSchedule = "0 9 * * *"
