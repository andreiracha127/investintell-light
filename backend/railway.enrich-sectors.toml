# Railway CRON service: refresh universe_constituents.sector from the data-lake
# GICS maps (sec_cusip_ticker_map first, then sec_isin_sector). Pointed at by the
# `enrich-sectors` service via its `railway_config_file` setting (same pattern as
# railway.api.toml). One-shot daily run — NO healthcheck, never restart, so the
# container exits cleanly after the enrichment instead of being health-gated like
# the always-on API (railway.toml / railway.api.toml).
[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uv run --no-sync python scripts/enrich_sectors.py"
cronSchedule = "0 6 * * *"
restartPolicyType = "never"
